<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>阶梯单量单价计算器(极简商务版)</title>
    <style>
        /* 保持原有优秀的 CSS 样式不变 */
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --accent-color: #8b5cf6;
            --accent-hover: #7c3aed;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body { background-color: var(--bg-color); color: var(--text-main); padding: 16px 8px; line-height: 1.6; -webkit-text-size-adjust: 100%; }
        .container { max-width: 700px; margin: 0 auto; }
        header { text-align: center; margin: 16px 0 24px 0; }
        header h1 { font-size: 1.8rem; color: var(--text-main); font-weight: 800; letter-spacing: -0.5px; }
        
        .card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05); border: 1px solid rgba(255, 255, 255, 0.7); }
        .card-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; color: var(--text-main); }
        .card-title .title-tag { display: inline-flex; align-items: center; gap: 6px; }
        .card-title .title-tag::before { content: ''; display: inline-block; width: 4px; height: 16px; border-radius: 2px; background: var(--primary-color); }
        .card-title.accent .title-tag::before { background: var(--accent-color); }
        .card-title.gray .title-tag::before { background: var(--text-muted); }

        .form-group { margin-bottom: 14px; }
        .form-group:last-child { margin-bottom: 0; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; color: var(--text-main); }
        .input-group { display: flex; align-items: center; position: relative; }
        .input-group input { width: 100%; padding: 12px 50px 12px 14px; border: 1.5px solid var(--border-color); border-radius: 10px; font-size: 1.05rem; font-weight: 500; color: var(--text-main); background-color: #f8fafc; transition: all 0.2s ease; }
        .input-group input:focus { outline: none; border-color: var(--primary-color); background-color: #fff; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12); }
        .accent-input input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.12); }
        .input-group .input-suffix { position: absolute; right: 14px; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); pointer-events: none; background: transparent; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .btn { padding: 10px 16px; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center; justify-content: center; gap: 4px; user-select: none; -webkit-user-select: none; }
        .btn-primary { background-color: #eff6ff; color: var(--primary-color); }
        .btn-primary:hover { background-color: var(--primary-color); color: white; }
        .btn-danger { background-color: #fef2f2; color: var(--danger-color); }
        .btn-danger:hover { background-color: var(--danger-color); color: white; }
        .btn-secondary { background-color: #f1f5f9; color: #475569; }
        .btn-secondary:hover { background-color: #e2e8f0; }
        .btn-sm { padding: 8px 12px; font-size: 0.8rem; border-radius: 8px; }
        .btn-group { display: flex; gap: 10px; margin-top: 16px; }

        .tier-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: center; margin-bottom: 10px; padding: 8px; background: #f8fafc; border-radius: 10px; border: 1px dashed var(--border-color); }
        .result-panel { display: flex; flex-direction: column; gap: 10px; }
        .grand-total-box { background: linear-gradient(135deg, #059669 0%, #10b981 100%); color: white; padding: 20px; border-radius: 14px; text-align: center; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2); }
        .grand-total-box .result-label { color: rgba(255, 255, 255, 0.85); font-weight: 500; }
        .grand-total-box .result-value { font-size: 2.2rem; font-weight: 800; color: white; margin-top: 4px;}
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .detail-box { background: #f8fafc; border: 1px solid var(--border-color); padding: 12px; border-radius: 12px; text-align: center; }
        .detail-box .result-value { font-size: 1.15rem; font-weight: 700; color: var(--text-main); margin-top: 2px; }

        .error-msg { color: var(--danger-color); background: #fef2f2; border: 1px solid #fecaca; padding: 12px; border-radius: 10px; margin-bottom: 14px; font-size: 0.88rem; font-weight: 500; display: none; }
        .save-tip { text-align: right; font-size: 0.75rem; color: var(--success-color); margin-top: -12px; margin-bottom: 12px; font-weight: 600; display: none; }

        .calculator-wrapper { background: #f8fafc; border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; max-width: 320px; margin: 0 auto; }
        #calcDisplay { width: 100%; height: 54px; margin-bottom: 12px; text-align: right; font-size: 1.6rem; padding: 8px 12px; border: 1.5px solid var(--border-color); border-radius: 8px; background: #fff; color: var(--text-main); font-weight: 700; letter-spacing: 1px; }
        #calcDisplay:focus { outline: none; border-color: var(--primary-color); }
        .calc-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .calc-btn { padding: 14px 0; font-size: 1.2rem; border: 1px solid var(--border-color); border-radius: 8px; background: #fff; cursor: pointer; transition: all 0.1s ease; font-weight: 600; color: var(--text-main); user-select: none; -webkit-user-select: none; }
        .calc-btn:hover { background: #e2e8f0; }
        .calc-btn:active { background: #cbd5e1; transform: scale(0.96); }
        .calc-op { background: #eff6ff; color: var(--primary-color); }
        .calc-clear { background: #fef2f2; color: var(--danger-color); }
        .calc-equal { background: var(--primary-color); color: #fff; }
        .calc-equal:hover { background: var(--primary-hover); }

        @media (min-width: 640px) {
            body { padding: 32px 16px; }
            header h1 { font-size: 2.2rem; }
            .grand-total-box { padding: 24px; }
            .grand-total-box .result-value { font-size: 2.6rem; }
            .detail-box { padding: 16px; }
            .detail-box .result-value { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>阶梯单量单价计算器</h1>
    </header>

    <div id="errorBox" class="error-msg"></div>
    <div id="saveTip" class="save-tip">✓ 数据已自动同步到本地存储</div>

    <div class="card" style="background: #ffffff;">
        <div class="result-panel">
            <div class="grand-total-box">
                <div class="result-label">统一汇总结算总额</div>
                <div id="resTotal" class="result-value">￥0.00</div>
            </div>
            <div class="detail-grid">
                <div class="detail-box" style="border-top: 3px solid var(--primary-color);">
                    <div class="result-label" style="color: var(--primary-color); font-size: 0.8rem; font-weight: 700;">常规匹配档位</div>
                    <div id="resTier" class="result-value">-</div>
                </div>
                <div class="detail-box" style="border-top: 3px solid var(--primary-color);">
                    <div class="result-label" style="color: var(--primary-color); font-size: 0.8rem; font-weight: 700;">常规小计</div>
                    <div id="resRegularTotal" class="result-value">￥0.00</div>
                </div>
                <div class="detail-box" style="border-top: 3px solid var(--accent-color);">
                    <div class="result-label" style="color: var(--accent-color); font-size: 0.8rem; font-weight: 700;">拼团明细</div>
                    <div id="resGroupInfo" class="result-value">0单 × ￥0.00</div>
                </div>
                <div class="detail-box" style="border-top: 3px solid var(--accent-color);">
                    <div class="result-label" style="color: var(--accent-color); font-size: 0.8rem; font-weight: 700;">拼团小计</div>
                    <div id="resGroupTotal" class="result-value">￥0.00</div>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-title"><span class="title-tag">常规业务数据</span></div>
        <div class="form-group">
            <label for="totalOrders">常规完成总单量</label>
            <div class="input-group">
                <input type="number" id="totalOrders" placeholder="请输入完成单数" min="0" step="1">
                <span class="input-suffix">单</span>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-title accent"><span class="title-tag">独立拼团选项</span></div>
        <div class="grid-2">
            <div class="form-group">
                <label for="groupOrders">拼团完成总单量</label>
                <div class="input-group accent-input">
                    <input type="number" id="groupOrders" placeholder="无则填0" min="0" step="1">
                    <span class="input-suffix">单</span>
                </div>
            </div>
            <div class="form-group">
                <label for="groupPrice">拼团固定单价</label>
                <div class="input-group accent-input">
                    <input type="number" id="groupPrice" placeholder="0.00" min="0" step="0.01">
                    <span class="input-suffix">元/单</span>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">
            <span class="title-tag">常规阶梯规则配置</span>
            <button class="btn btn-primary btn-sm" id="btnAddTier">+ 添加新档位</button>
        </div>
        
        <div id="tierContainer"></div>

        <div class="btn-group">
            <button class="btn btn-secondary btn-sm" id="btnReset">恢复图片默认规则</button>
            <button class="btn btn-secondary btn-sm" id="btnClear" style="margin-left: auto;">清空所有内容</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title gray"><span class="title-tag">便携计算器</span></div>
        <div class="calculator-wrapper">
            <input type="text" id="calcDisplay" readonly placeholder="0">
            <div class="calc-buttons">
                <button class="calc-btn calc-clear">C</button>
                <button class="calc-btn calc-clear">⌫</button>
                <button class="calc-btn calc-op">/</button>
                <button class="calc-btn calc-op">*</button>
                
                <button class="calc-btn">7</button>
                <button class="calc-btn">8</button>
                <button class="calc-btn">9</button>
                <button class="calc-btn calc-op">-</button>
                
                <button class="calc-btn">4</button>
                <button class="calc-btn">5</button>
                <button class="calc-btn">6</button>
                <button class="calc-btn calc-op">+</button>
                
                <button class="calc-btn">1</button>
                <button class="calc-btn">2</button>
                <button class="calc-btn">3</button>
                <button class="calc-btn calc-equal" style="grid-row: span 2;">=</button>
                
                <button class="calc-btn" style="grid-column: span 2;">0</button>
                <button class="calc-btn">.</button>
            </div>
        </div>
    </div>

</div>

<script>
    // --- 移动端体验优化：全局拦截与修复 ---
    (function() {
        document.addEventListener('touchstart', function (event) { if (event.touches.length > 1) event.preventDefault(); }, { passive: false });
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            let now = Date.now();
            if (now - lastTouchEnd <= 300) event.preventDefault();
            lastTouchEnd = now;
        }, { passive: false });
        document.addEventListener('dblclick', function(event) { event.preventDefault(); }, { passive: false });
        
        // 优化：防止 number 输入框滚动鼠标滚轮时意外修改数值
        document.addEventListener('wheel', function(event) {
            if (document.activeElement.type === 'number') {
                document.activeElement.blur();
            }
        }, { passive: true });
    })();

    // --- 核心逻辑 ---
    const imageTiers = [
        { minOrder: 1, price: 3.0 },
        { minOrder: 600, price: 4.5 },
        { minOrder: 1000, price: 5.0 },
        { minOrder: 1200, price: 5.5 },
        { minOrder: 1500, price: 6.0 }
    ];

    const totalOrdersInput = document.getElementById('totalOrders');
    const groupOrdersInput = document.getElementById('groupOrders');
    const groupPriceInput = document.getElementById('groupPrice');
    
    const tierContainer = document.getElementById('tierContainer');
    const btnAddTier = document.getElementById('btnAddTier');
    const btnReset = document.getElementById('btnReset');
    const btnClear = document.getElementById('btnClear');
    const errorBox = document.getElementById('errorBox');
    const saveTip = document.getElementById('saveTip');

    const resTier = document.getElementById('resTier');
    const resRegularTotal = document.getElementById('resRegularTotal');
    const resGroupInfo = document.getElementById('resGroupInfo');
    const resGroupTotal = document.getElementById('resGroupTotal');
    const resTotal = document.getElementById('resTotal');

    let saveTimeout = null;

    window.addEventListener('DOMContentLoaded', () => {
        initData();
    });

    function initData() {
        let localData = null;
        try {
            if (window.localStorage) {
                localData = localStorage.getItem('tier_calculator_storage_v2');
            }
        } catch (e) {
            console.warn("存储受限，使用内存模式");
        }

        if (localData) {
            try {
                const parsed = JSON.parse(localData);
                // 优化：增加对象类型安全检查
                if (parsed && typeof parsed === 'object') {
                    totalOrdersInput.value = parsed.totalOrders || '';
                    groupOrdersInput.value = parsed.groupOrders || '';
                    groupPriceInput.value = parsed.groupPrice || '';
                    tierContainer.innerHTML = '';
                    if(Array.isArray(parsed.tiers) && parsed.tiers.length > 0) {
                        parsed.tiers.forEach(tier => addTierRow(tier.minOrder, tier.price));
                    }
                    calculate(false); 
                    return;
                }
            } catch (e) {
                console.error("缓存数据解析失败，已重置");
            }
        }
        loadDefaultImageTiers();
    }

    function loadDefaultImageTiers() {
        tierContainer.innerHTML = '';
        imageTiers.forEach(tier => addTierRow(tier.minOrder, tier.price));
        totalOrdersInput.value = 650; 
        groupOrdersInput.value = 200; 
        groupPriceInput.value = 3.5;  
        calculate(true);
    }

    // 安全漏洞修复：移除模板字符串直接注入变量的方式，防止 XSS
    function addTierRow(minOrder = '', price = '') {
        const row = document.createElement('div');
        row.className = 'tier-row';
        row.innerHTML = `
            <div class="input-group">
                <input type="number" class="input-min" placeholder="最低起算" min="0" step="1">
                <span class="input-suffix">单起</span>
            </div>
            <div class="input-group">
                <input type="number" class="input-price" placeholder="单价" min="0" step="0.01">
                <span class="input-suffix">元</span>
            </div>
            <div>
                <button class="btn btn-danger btn-sm btn-del">× 删除</button>
            </div>
        `;
        
        // 安全赋值
        row.querySelector('.input-min').value = minOrder;
        row.querySelector('.input-price').value = price;

        row.querySelector('.btn-del').addEventListener('click', () => {
            row.remove();
            calculate(true);
        });

        row.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', () => calculate(true));
        });

        tierContainer.appendChild(row);
    }

    function calculate(shouldSave = true) {
        showError("");
        
        const totalOrdersStr = totalOrdersInput.value.trim();
        const groupOrdersStr = groupOrdersInput.value.trim();
        const groupPriceStr = groupPriceInput.value.trim();
        
        const rows = tierContainer.querySelectorAll('.tier-row');
        const currentTiersForSave = [];
        rows.forEach(row => {
            currentTiersForSave.push({
                minOrder: row.querySelector('.input-min').value,
                price: row.querySelector('.input-price').value
            });
        });

        if (shouldSave) {
            triggerAutoSave(totalOrdersStr, groupOrdersStr, groupPriceStr, currentTiersForSave);
        }

        let regularSubtotal = 0;
        let regularTierText = "-";
        
        if (totalOrdersStr !== "") {
            const totalOrders = parseFloat(totalOrdersStr);
            if (totalOrders < 0 || !Number.isInteger(totalOrders)) {
                showError("常规总单量需要输入一个正整数！");
                resetResultDisplay();
                return;
            }

            const validTiersList = [];
            let hasTierError = false;

            currentTiersForSave.forEach(tier => {
                if (tier.minOrder === "" || tier.price === "") { hasTierError = true; return; }
                const minOrder = parseFloat(tier.minOrder);
                const price = parseFloat(tier.price);
                if (minOrder < 0 || price < 0 || !Number.isInteger(minOrder)) { hasTierError = true; return; }
                validTiersList.push({ minOrder, price });
            });

            if (hasTierError) {
                showError("规则配置栏中有不合法的单量或单价负数！");
                resetResultDisplay();
                return;
            }

            if (validTiersList.length === 0) {
                showError("提示：请先添加一组常规阶梯计价规则。");
                resetResultDisplay();
                return;
            }

            validTiersList.sort((a, b) => a.minOrder - b.minOrder);
            let matchedIndex = -1;
            for (let i = 0; i < validTiersList.length; i++) {
                if (totalOrders >= validTiersList[i].minOrder) { matchedIndex = i; }
            }

            if (matchedIndex !== -1) {
                const matchedTier = validTiersList[matchedIndex];
                regularSubtotal = totalOrders * matchedTier.price;
                
                if (matchedIndex === validTiersList.length - 1) {
                    regularTierText = `${matchedTier.minOrder}单起 (￥${matchedTier.price.toFixed(2)})`;
                } else {
                    const nextTier = validTiersList[matchedIndex + 1];
                    regularTierText = `${matchedTier.minOrder}-${nextTier.minOrder - 1}单 (￥${matchedTier.price.toFixed(2)})`;
                }
            } else {
                regularTierText = "未达任何门槛";
                regularSubtotal = 0;
            }
        }

        let groupSubtotal = 0;
        let groupCount = 0;
        let groupUnitPrice = 0;

        if (groupOrdersStr !== "" || groupPriceStr !== "") {
            groupCount = groupOrdersStr === "" ? 0 : parseFloat(groupOrdersStr);
            groupUnitPrice = groupPriceStr === "" ? 0 : parseFloat(groupPriceStr);

            if (groupCount < 0 || !Number.isInteger(groupCount)) {
                showError("拼团单量需要输入一个正整数！");
                resetResultDisplay();
                return;
            }
            if (groupUnitPrice < 0) {
                showError("拼团固定单价不能为负数！");
                resetResultDisplay();
                return;
            }
            groupSubtotal = groupCount * groupUnitPrice;
        }

        const grandTotal = regularSubtotal + groupSubtotal;
        
        resTier.textContent = regularTierText;
        resRegularTotal.textContent = `￥${regularSubtotal.toFixed(2)}`;
        resGroupInfo.textContent = `${groupCount} 单 × ￥${groupUnitPrice.toFixed(2)}`;
        resGroupTotal.textContent = `￥${groupSubtotal.toFixed(2)}`;
        resTotal.textContent = `￥${grandTotal.toFixed(2)}`;
    }

    function resetResultDisplay() {
        resTier.textContent = "数据错误";
        resRegularTotal.textContent = "￥0.00";
        resGroupInfo.textContent = "0单 × ￥0.00";
        resGroupTotal.textContent = "￥0.00";
        resTotal.textContent = "￥0.00";
    }

    function triggerAutoSave(totalOrders, groupOrders, groupPrice, tiers) {
        try {
            if (window.localStorage) {
                const dataToSave = { totalOrders, groupOrders, groupPrice, tiers };
                localStorage.setItem('tier_calculator_storage_v2', JSON.stringify(dataToSave));
                
                saveTip.style.display = 'block';
                if (saveTimeout) clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => {
                    saveTip.style.display = 'none';
                }, 1200);
            }
        } catch (e) {}
    }

    function showError(msg) {
        if (msg) {
            errorBox.textContent = msg;
            errorBox.style.display = 'block';
        } else {
            errorBox.style.display = 'none';
        }
    }

    totalOrdersInput.addEventListener('input', () => calculate(true));
    groupOrdersInput.addEventListener('input', () => calculate(true));
    groupPriceInput.addEventListener('input', () => calculate(true));
    
    btnAddTier.addEventListener('click', () => {
        addTierRow();
        calculate(true);
    });

    btnReset.addEventListener('click', () => {
        loadDefaultImageTiers();
    });

    btnClear.addEventListener('click', () => {
        tierContainer.innerHTML = '';
        totalOrdersInput.value = '';
        groupOrdersInput.value = '';
        groupPriceInput.value = '';
        calculate(true);
    });

    // --- 便携计算器漏洞修复：增强正则防护 ---
    const calcDisplay = document.getElementById('calcDisplay');
    const calcButtons = document.querySelectorAll('.calc-buttons .calc-btn');
    let calcValue = '';

    calcButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            const action = btn.textContent;
            
            if (action === 'C') {
                calcValue = '';
            } else if (action === '⌫') {
                calcValue = calcValue.slice(0, -1);
            } else if (action === '=') {
                try {
                    if(calcValue.trim() !== '') {
                        // 核心安全优化：通过正则表达式限制只允许数字和数学运算符
                        if (/^[0-9+\-*/.\s]+$/.test(calcValue)) {
                            let result = new Function('return ' + calcValue)();
                            // 处理精度并转字符串
                            calcValue = String(Math.round(result * 100000000) / 100000000); 
                        } else {
                            throw new Error("Invalid Input");
                        }
                    }
                } catch (e) {
                    calcValue = '错误';
                }
            } else {
                if (calcValue === '错误') calcValue = '';
                calcValue += action;
            }
            calcDisplay.value = calcValue;
        });
    });
</script>

</body>
</html>
