<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>骑手辅助工具 - 智能门禁管理与商家导航</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --primary-light: #e0e7ff;
            --secondary: #0ea5e9;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius-md: 12px;
            --radius-lg: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark-mode {
            --primary: #6366f1;
            --primary-light: #3730a3;
            --bg-color: #111827;
            --card-bg: #1f2937;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --border-color: #374151;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; transition: background-color 0.3s ease; padding: 15px; }
        .container { max-width: 1200px; margin: 0 auto; }

        /* Header UI */
        header { text-align: center; margin-bottom: 30px; position: relative; }
        .header-top { display: flex; justify-content: flex-end; margin-bottom: -40px; position: relative; z-index: 10;}
        .theme-toggle { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--shadow-sm); transition: var(--transition); }
        .theme-toggle:hover { transform: scale(1.05); }
        
        .logo-icon img { width: 120px; height: 120px; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0; }
        .logo-text { color: var(--text-muted); font-size: 0.95rem; }

        /* Tabs UI */
        .tabs { display: flex; background: var(--card-bg); border-radius: var(--radius-lg); padding: 6px; box-shadow: var(--shadow-md); margin-bottom: 25px; gap: 8px; }
        .tab { flex: 1; padding: 14px; text-align: center; font-weight: 600; font-size: 1rem; color: var(--text-muted); cursor: pointer; border-radius: var(--radius-md); transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .tab.active { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }
        .tab:not(.active):hover { background: var(--primary-light); color: var(--primary); }
        .tab-content { display: none; animation: fadeIn 0.4s ease forwards; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Search UI */
        .search-container { position: sticky; top: 10px; z-index: 100; margin-bottom: 25px; }
        .search-box { position: relative; background: var(--card-bg); border-radius: 50px; box-shadow: var(--shadow-md); overflow: hidden; border: 2px solid transparent; transition: var(--transition); }
        .search-box:focus-within { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-light); }
        .search-box input { width: 100%; padding: 16px 50px; border: none; background: transparent; font-size: 1.05rem; color: var(--text-main); outline: none; }
        .search-box .fa-search { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-box .clear-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: var(--border-color); border: none; width: 26px; height: 26px; border-radius: 50%; color: var(--text-main); cursor: pointer; display: none; align-items: center; justify-content: center; transition: var(--transition); }
        .search-box .clear-btn.visible { display: flex; }
        .search-box .clear-btn:hover { background: var(--text-muted); color: white; }

        /* Grid & Cards */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: var(--radius-lg); border: 1px solid var(--border-color); box-shadow: var(--shadow-sm); overflow: hidden; transition: var(--transition); cursor: pointer; position: relative; }
        .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-3px); border-color: var(--primary-light); }
        .card-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .card-info h3 { font-size: 1.25rem; margin-bottom: 4px; color: var(--text-main); }
        .card-info p { font-size: 0.85rem; color: var(--text-muted); }
        .expand-icon { color: var(--primary); transition: transform 0.3s ease; font-size: 1.2rem; }
        .card.expanded .expand-icon { transform: rotate(180deg); }
        
        .card-body { max-height: 0; overflow: hidden; transition: max-height 0.4s ease, padding 0.4s ease; background: var(--primary-light); padding: 0 20px; }
        .card.expanded .card-body { max-height: 200px; padding: 20px; border-top: 1px solid var(--border-color); }
        .password { font-family: 'Courier New', Courier, monospace; font-size: 1.8rem; font-weight: 700; color: var(--primary); text-align: center; letter-spacing: 2px; margin-top: 5px; }

        /* Business Cards */
        .business-card { background: var(--card-bg); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-md); margin-bottom: 25px; border: 1px solid var(--border-color); }
        .image-carousel { position: relative; width: 100%; height: 280px; background: var(--border-color); overflow: hidden; }
        .carousel-container { display: flex; height: 100%; transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        .carousel-slide { min-width: 100%; height: 100%; position: relative; }
        .carousel-slide img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; transition: transform 0.3s; }
        .carousel-slide img:hover { transform: scale(1.03); }
        .placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); background: var(--card-bg); opacity: 0.7; }
        .placeholder i { font-size: 3rem; margin-bottom: 10px; }
        
        .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.4); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .carousel-btn:hover { background: rgba(0,0,0,0.7); }
        .carousel-btn.prev { left: 10px; }
        .carousel-btn.next { right: 10px; }
        .carousel-indicators { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 10; }
        .indicator { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.4); cursor: pointer; }
        .indicator.active { background: white; transform: scale(1.2); }

        .business-info { padding: 20px; }
        .business-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .business-name { font-size: 1.3rem; font-weight: 700; color: var(--text-main); }
        .business-badge { background: var(--primary-light); color: var(--primary-dark); padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; white-space: nowrap; }
        .business-instructions { background: var(--bg-color); border-radius: var(--radius-md); padding: 15px; border-left: 4px solid var(--primary); }
        .instructions-title { font-weight: 600; color: var(--text-main); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .instructions-steps { padding-left: 20px; color: var(--text-muted); font-size: 0.95rem; }
        .instructions-steps li { margin-bottom: 5px; }

        /* Empty States & Notices */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state i { font-size: 4rem; color: var(--border-color); margin-bottom: 15px; }
        .contribution-notice { display: flex; align-items: center; gap: 15px; background: linear-gradient(to right, var(--primary-light), var(--card-bg)); padding: 15px 20px; border-radius: var(--radius-md); margin-bottom: 25px; border-left: 4px solid var(--primary); }
        .contribution-notice i { font-size: 1.8rem; color: var(--primary); }
        
        /* Modal */
        .image-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; }
        .image-modal.active { display: flex; opacity: 1; }
        .modal-content { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .modal-image { max-width: 95vw; max-height: 85vh; object-fit: contain; border-radius: 8px; transition: transform 0.3s; }
        .modal-close, .modal-nav { position: absolute; background: rgba(255,255,255,0.1); color: white; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-close { top: 20px; right: 20px; width: 50px; height: 50px; font-size: 1.5rem; }
        .modal-nav { top: 50%; transform: translateY(-50%); width: 60px; height: 60px; font-size: 2rem; }
        .modal-nav.prev { left: 20px; }
        .modal-nav.next { right: 20px; }
        .modal-controls { position: absolute; bottom: 30px; display: flex; align-items: center; gap: 20px; color: white; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 30px; backdrop-filter: blur(5px); }

        footer { text-align: center; padding: 30px 0; color: var(--text-muted); font-size: 0.9rem; }

        @media (min-width: 768px) {
            .image-carousel { height: 400px; }
            .business-card { display: grid; grid-template-columns: 1fr 1fr; }
            .business-info { display: flex; flex-direction: column; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <button class="theme-toggle" id="themeToggle" aria-label="切换主题模式">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
            <div class="logo-icon">
                <img src="https://i.postimg.cc/25nj9NBd/IMG-1841-2-1-1.png" alt="骑手图标">
            </div>
            <h1>骑手辅助工具</h1>
            <p class="logo-text">门禁管理与商家导航秒查方案</p>
        </header>
        
        <div class="contribution-notice">
            <i class="fas fa-hands-helping"></i>
            <div>
                <div style="font-weight: 600; color: var(--text-main);">信息互助社区</div>
                <div style="font-size: 0.9rem; color: var(--text-muted);">有新密码或新商家？欢迎联系管理员更新，方便大家！</div>
            </div>
        </div>
        
        <div class="tabs">
            <div class="tab active" data-target="tab-communities"><i class="fas fa-key"></i> 小区门禁</div>
            <div class="tab" data-target="tab-businesses"><i class="fas fa-store"></i> 商家指引</div>
        </div>
        
        <div class="tab-content active" id="tab-communities">
            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="输入小区名称快速搜索...">
                    <button class="clear-btn" id="clearSearch"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div class="card-grid" id="cardGrid"></div>
        </div>
        
        <div class="tab-content" id="tab-businesses">
            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="businessSearchInput" placeholder="输入商家名称或类型搜索...">
                    <button class="clear-btn" id="clearBusinessSearch"><i class="fas fa-times"></i></button>
                </div>
            </div>
            <div id="businessGuide"></div>
        </div>
        
        <footer>
            <p>骑手辅助工具 © 2025 - 安全骑行，高效配送</p>
        </footer>
    </div>

    <div class="image-modal" id="imageModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
            <button class="modal-nav prev" id="modalPrev"><i class="fas fa-chevron-left"></i></button>
            <img class="modal-image" id="modalImage" src="" alt="放大预览">
            <button class="modal-nav next" id="modalNext"><i class="fas fa-chevron-right"></i></button>
            <div class="modal-controls">
                <span id="modalCounter">1 / 5</span>
                <i class="fas fa-search-plus" id="modalZoom" style="cursor: pointer; font-size: 1.2rem;"></i>
            </div>
        </div>
    </div>

    <script>
        // --- 数据定义区 ---
        // 核心真实小区数据
        const realCommunities = [
            { name: "都市花园", password: "f4 01011234" }, { name: "梅花公寓", password: "#2525" },
            { name: "中房馨园", password: "*#123456#" }, { name: "春和花园11号楼", password: "0#666888" },
            { name: "金玉源", password: "9*8525" }, { name: "尚都公馆", password: "789#" },
            { name: "蓝水湾", password: "#258191#" }, { name: "新华广场", password: "#8888" },
            { name: "守阳岛", password: "🔑10011234" }, { name: "和平郡府", password: "*111111" },
            { name: "阿尔卡迪亚", password: "0202全是8#" }, { name: "华夏水晶城", password: "#88889999" }
        ];
        
        // 动态生成剩余空白小区，避免HTML过度冗长
        const communities = [...realCommunities];
        for(let i = 1; i <= 88; i++) {
            communities.push({ name: `待添加小区 ${i}`, password: "暂无数据" });
        }

        // 核心真实商家图片映射
        const businessImages = {
            1: ['https://i.postimg.cc/3JLJqcm4/IMG-1793.jpg', 'https://i.postimg.cc/Sx2wscZr/IMG-1889.jpg'],
            2: ['https://i.postimg.cc/GtntSZyw/IMG-1805.jpg', 'https://i.postimg.cc/X7JzX92P/IMG-1884.jpg', 'https://i.postimg.cc/c15c92mD/IMG-1885.jpg']
        };

        // 核心商家数据（精简版示例，可动态补全）
        const realBusinesses = [
            { id: 1, name: "晨亦碗、潮汕牛肉饭（一家店）", type: "餐饮", navigation: ["暂无详细路线", "建议抵达市场后询问保安"] },
            { id: 2, name: "肉哆哆、椒小仙（一家店）", type: "餐饮", navigation: ["从市场正门进入", "一直走到最西南角即是"] },
            { id: 3, name: "福满楼餐厅", type: "餐饮", navigation: ["从小区主入口进入", "第二个路口右转", "红色大门，有停车位"] },
            { id: 31, name: "全家便利店", type: "便利店", navigation: ["小区正门入口处", "保安室对面", "绿色招牌"] },
            { id: 46, name: "顺丰快递", type: "快递", navigation: ["小区西门快递站", "1号位置", "黑红标志"] }
        ];

        // 动态补全100个商家
        const businesses = [...realBusinesses];
        for(let i = 4; i <= 100; i++) {
            if(!businesses.find(b => b.id === i)) {
                businesses.push({ id: i, name: `其它分类商家 ${i}`, type: "其它", navigation: ["暂无指引"] });
            }
        }

        // --- 全局状态管理 ---
        const state = {
            communitySearch: '',
            businessSearch: '',
            expandedCards: new Set(),
            carouselIndexes: {}, // { businessId: currentIndex }
            modal: { active: false, images: [], currentIndex: 0, isZoomed: false }
        };

        // --- DOM 元素引用 ---
        const DOM = {
            themeToggle: document.getElementById('themeToggle'),
            tabs: document.querySelectorAll('.tab'),
            tabContents: document.querySelectorAll('.tab-content'),
            
            searchInput: document.getElementById('searchInput'),
            clearSearch: document.getElementById('clearSearch'),
            cardGrid: document.getElementById('cardGrid'),
            
            busSearchInput: document.getElementById('businessSearchInput'),
            clearBusSearch: document.getElementById('clearBusinessSearch'),
            businessGuide: document.getElementById('businessGuide'),

            modal: document.getElementById('imageModal'),
            modalImg: document.getElementById('modalImage'),
            modalClose: document.getElementById('modalClose'),
            modalPrev: document.getElementById('modalPrev'),
            modalNext: document.getElementById('modalNext'),
            modalCounter: document.getElementById('modalCounter'),
            modalZoom: document.getElementById('modalZoom')
        };

        // --- 初始化与核心渲染逻辑 ---
        function init() {
            // 系统暗色模式检测
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.body.classList.add('dark-mode');
                DOM.themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            }

            renderCommunities();
            renderBusinesses();
            bindEvents();
        }

        // 渲染小区列表
        function renderCommunities() {
            const filtered = communities.filter(c => c.name.toLowerCase().includes(state.communitySearch.toLowerCase()));
            
            if (filtered.length === 0) {
                DOM.cardGrid.innerHTML = `<div class="empty-state"><i class="fas fa-box-open"></i><h3>未找到匹配的小区</h3><p>换个关键词试试吧</p></div>`;
                return;
            }

            DOM.cardGrid.innerHTML = filtered.map((c, index) => {
                const isPlaceholder = c.name.includes('待添加');
                const isExpanded = state.expandedCards.has(index);
                return `
                    <div class="card ${isExpanded ? 'expanded' : ''}" data-index="${index}">
                        <div class="card-header">
                            <div class="card-info">
                                <h3>${c.name}</h3>
                                <p>${isPlaceholder ? '门禁信息缺失' : '点击查看密码'}</p>
                            </div>
                            <i class="fas fa-chevron-down expand-icon"></i>
                        </div>
                        <div class="card-body">
                            <div style="font-size:0.9rem; color:var(--text-muted); text-align:center;">
                                <i class="fas fa-key"></i> ${isPlaceholder ? '等待骑手兄弟补充' : '门禁密码'}
                            </div>
                            <div class="password" style="${isPlaceholder ? 'color: var(--text-muted); font-size: 1.2rem;' : ''}">${c.password}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 渲染商家列表
        function renderBusinesses() {
            const filtered = businesses.filter(b => 
                b.name.toLowerCase().includes(state.businessSearch.toLowerCase()) || 
                b.type.toLowerCase().includes(state.businessSearch.toLowerCase())
            );

            if (filtered.length === 0) {
                DOM.businessGuide.innerHTML = `<div class="empty-state"><i class="fas fa-store-slash"></i><h3>未找到匹配的商家</h3></div>`;
                return;
            }

            DOM.businessGuide.innerHTML = filtered.map(b => {
                const images = businessImages[b.id] || [];
                const hasImages = images.length > 0;
                // 初始化轮播状态
                if(hasImages && !state.carouselIndexes[b.id]) state.carouselIndexes[b.id] = 0;
                
                let slidesHtml = '';
                if(hasImages) {
                    slidesHtml = images.map((img, i) => `
                        <div class="carousel-slide">
                            <img src="${img}" alt="${b.name}" class="previewable-img" data-bid="${b.id}" data-index="${i}">
                        </div>
                    `).join('');
                } else {
                    slidesHtml = `<div class="carousel-slide"><div class="placeholder"><i class="fas fa-camera"></i><p>暂无商家实拍图</p></div></div>`;
                }

                const indicatorsHtml = hasImages && images.length > 1 ? 
                    images.map((_, i) => `<span class="indicator ${i===0?'active':''}" data-bid="${b.id}" data-slide="${i}"></span>`).join('') : '';
                
                const navBtnsHtml = hasImages && images.length > 1 ? `
                    <button class="carousel-btn prev" data-bid="${b.id}"><i class="fas fa-chevron-left"></i></button>
                    <button class="carousel-btn next" data-bid="${b.id}"><i class="fas fa-chevron-right"></i></button>
                ` : '';

                return `
                    <div class="business-card">
                        <div class="image-carousel">
                            <div class="carousel-container" id="carousel-${b.id}">
                                ${slidesHtml}
                            </div>
                            ${navBtnsHtml}
                            <div class="carousel-indicators" id="indicators-${b.id}">
                                ${indicatorsHtml}
                            </div>
                        </div>
                        <div class="business-info">
                            <div class="business-header">
                                <h3 class="business-name">${b.name}</h3>
                                <span class="business-badge">${b.type}</span>
                            </div>
                            <div class="business-instructions">
                                <div class="instructions-title"><i class="fas fa-map-marked-alt"></i> 寻店指引</div>
                                <ol class="instructions-steps">
                                    ${b.navigation.map(step => `<li>${step}</li>`).join('')}
                                </ol>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- 交互与事件绑定 ---
        function bindEvents() {
            // 工具类：防抖函数
            const debounce = (func, delay) => {
                let timer;
                return (...args) => { clearTimeout(timer); timer = setTimeout(() => func(...args), delay); };
            };

            // 主题切换
            DOM.themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                DOM.themeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });

            // Tabs 切换
            DOM.tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    DOM.tabs.forEach(t => t.classList.remove('active'));
                    DOM.tabContents.forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(tab.dataset.target).classList.add('active');
                });
            });

            // 搜索交互 (小区)
            DOM.searchInput.addEventListener('input', debounce((e) => {
                state.communitySearch = e.target.value.trim();
                DOM.clearSearch.classList.toggle('visible', state.communitySearch.length > 0);
                renderCommunities();
            }, 300));

            DOM.clearSearch.addEventListener('click', () => {
                DOM.searchInput.value = '';
                state.communitySearch = '';
                DOM.clearSearch.classList.remove('visible');
                renderCommunities();
            });

            // 搜索交互 (商家)
            DOM.busSearchInput.addEventListener('input', debounce((e) => {
                state.businessSearch = e.target.value.trim();
                DOM.clearBusSearch.classList.toggle('visible', state.businessSearch.length > 0);
                renderBusinesses();
            }, 300));

            DOM.clearBusSearch.addEventListener('click', () => {
                DOM.busSearchInput.value = '';
                state.businessSearch = '';
                DOM.clearBusSearch.classList.remove('visible');
                renderBusinesses();
            });

            // 小区卡片手风琴折叠 (事件委托)
            DOM.cardGrid.addEventListener('click', (e) => {
                const card = e.target.closest('.card');
                if (!card) return;
                const index = parseInt(card.dataset.index);
                
                if (state.expandedCards.has(index)) {
                    state.expandedCards.delete(index);
                    card.classList.remove('expanded');
                } else {
                    // 开启互斥：点击一个收起其他的
                    document.querySelectorAll('.card.expanded').forEach(c => {
                        c.classList.remove('expanded');
                        state.expandedCards.delete(parseInt(c.dataset.index));
                    });
                    state.expandedCards.add(index);
                    card.classList.add('expanded');
                }
            });

            // 商家轮播与图片点击 (事件委托解决重复绑定和内存泄露)
            DOM.businessGuide.addEventListener('click', (e) => {
                // 处理轮播按钮
                const btn = e.target.closest('.carousel-btn');
                if (btn) {
                    const bid = btn.dataset.bid;
                    const isNext = btn.classList.contains('next');
                    navigateCarousel(bid, isNext);
                    return;
                }

                // 处理指示器点击
                const indicator = e.target.closest('.indicator');
                if (indicator) {
                    const bid = indicator.dataset.bid;
                    const targetSlide = parseInt(indicator.dataset.slide);
                    goToSlide(bid, targetSlide);
                    return;
                }

                // 处理图片放大预览 (仅含 previewable-img 类的触发)
                const img = e.target.closest('.previewable-img');
                if (img) {
                    const bid = img.dataset.bid;
                    const index = parseInt(img.dataset.index);
                    openModal(bid, index);
                }
            });

            // 模态框事件
            DOM.modalClose.addEventListener('click', closeModal);
            DOM.modal.addEventListener('click', (e) => { if(e.target === DOM.modal) closeModal(); });
            DOM.modalPrev.addEventListener('click', () => navigateModal(-1));
            DOM.modalNext.addEventListener('click', () => navigateModal(1));
            DOM.modalZoom.addEventListener('click', toggleZoom);
            
            // 键盘支持
            document.addEventListener('keydown', (e) => {
                if (!state.modal.active) return;
                if (e.key === 'Escape') closeModal();
                if (e.key === 'ArrowLeft') navigateModal(-1);
                if (e.key === 'ArrowRight') navigateModal(1);
            });
        }

        // --- 轮播图控制逻辑 ---
        function navigateCarousel(bid, isNext) {
            const images = businessImages[bid];
            if(!images) return;
            let current = state.carouselIndexes[bid] || 0;
            current = isNext ? (current + 1) % images.length : (current - 1 + images.length) % images.length;
            goToSlide(bid, current);
        }

        function goToSlide(bid, slideIndex) {
            state.carouselIndexes[bid] = slideIndex;
            const container = document.getElementById(`carousel-${bid}`);
            const indicators = document.getElementById(`indicators-${bid}`);
            
            if(container) {
                container.style.transform = `translateX(-${slideIndex * 100}%)`;
            }
            if(indicators) {
                Array.from(indicators.children).forEach((ind, i) => {
                    ind.classList.toggle('active', i === slideIndex);
                });
            }
        }

        // --- 图片模态框逻辑 ---
        function openModal(bid, index) {
            const images = businessImages[bid];
            // 空数据拦截防崩溃
            if (!images || images.length === 0) return; 

            state.modal.active = true;
            state.modal.images = images;
            state.modal.currentIndex = index;
            state.modal.isZoomed = false;

            updateModalUI();
            DOM.modal.classList.add('active');
            document.body.style.overflow = 'hidden'; // 防止背景滚动
        }

        function closeModal() {
            state.modal.active = false;
            DOM.modal.classList.remove('active');
            document.body.style.overflow = '';
            
            // 重置缩放
            state.modal.isZoomed = false;
            DOM.modalImg.style.transform = 'scale(1)';
        }

        function navigateModal(direction) {
            const total = state.modal.images.length;
            if(total <= 1) return;
            state.modal.currentIndex = (state.modal.currentIndex + direction + total) % total;
            
            // 切换图片时重置缩放
            state.modal.isZoomed = false;
            DOM.modalImg.style.transform = 'scale(1)';
            DOM.modalZoom.className = 'fas fa-search-plus';
            
            updateModalUI();
        }

        function updateModalUI() {
            DOM.modalImg.src = state.modal.images[state.modal.currentIndex];
            DOM.modalCounter.textContent = `${state.modal.currentIndex + 1} / ${state.modal.images.length}`;
            
            // 若只有一张图，隐藏左右箭头
            const showNav = state.modal.images.length > 1;
            DOM.modalPrev.style.display = showNav ? 'flex' : 'none';
            DOM.modalNext.style.display = showNav ? 'flex' : 'none';
        }

        function toggleZoom() {
            state.modal.isZoomed = !state.modal.isZoomed;
            DOM.modalImg.style.transform = state.modal.isZoomed ? 'scale(1.8)' : 'scale(1)';
            DOM.modalImg.style.cursor = state.modal.isZoomed ? 'zoom-out' : 'zoom-in';
            DOM.modalZoom.className = state.modal.isZoomed ? 'fas fa-search-minus' : 'fas fa-search-plus';
        }

        // 启动应用
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
